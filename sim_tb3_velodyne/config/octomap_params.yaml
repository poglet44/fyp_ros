octomap_server:
  ros__parameters:
    frame_id: odom
    resolution: 0.05
    sensor_model.max_range: 15.0
    sensor_model.hit: 0.7
    sensor_model.miss: 0.4
    sensor_model.min: 0.12
    sensor_model.max: 0.97
    occupancy_min_z: 0.1
    occupancy_max_z: 1.5
    pointcloud_min_z: 0.1
    pointcloud_max_z: 1.5
    filter_ground_plane: true